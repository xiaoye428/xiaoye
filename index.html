<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Free AI Paraphraser</title>
<style>
body{font-family:Arial;max-width:800px;margin:40px auto;background:#f5f5f5}
.box{background:white;padding:20px;border-radius:10px}
textarea{width:100%;height:160px;padding:10px}
button{padding:10px 20px;background:#007bff;color:white;border:0;border-radius:6px;cursor:pointer}
.result{margin-top:20px;background:#eee;padding:10px;min-height:80px}
</style>
</head>

<body>
<div class="box">
<h2>Free AI Paraphraser</h2>

<textarea id="input" placeholder="Enter text..."></textarea>

<button onclick="rewrite()">Paraphrase</button>

<div class="result" id="result"></div>
</div>

<script>
async function rewrite() {
  const text = document.getElementById("input").value;
  const resultBox = document.getElementById("result");

  if (!text) {
    alert("请输入内容");
    return;
  }

  resultBox.innerText = "Processing...";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        messages: [
          {
            role: "user",
            content: "Paraphrase this text: " + text
          }
        ]
      })
    });

    const data = await res.json();

    // 👇关键修复：必须取 content
    resultBox.innerText =
      data.choices?.[0]?.message?.content || JSON.stringify(data);

  } catch (err) {
    resultBox.innerText = "Error: " + err.message;
  }
}
</script>

</body>
</html>
